<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPS + cubos con física</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        overflow: hidden;
        height: 100%;
        background: #0a0a12;
        font-family: system-ui, sans-serif;
      }
      #blocker {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(10, 10, 18, 0.92);
        z-index: 2;
        cursor: pointer;
        color: #e8e8f0;
        text-align: center;
        padding: 24px;
      }
      #blocker.hidden {
        display: none;
      }
      #blocker h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 12px;
      }
      #blocker p {
        opacity: 0.85;
        line-height: 1.5;
        max-width: 420px;
      }
    </style>
  </head>
  <body>
    <div id="blocker">
      <div>
        <h1>Clic para jugar</h1>
        <p>
          WASD para mover, ratón para mirar.<br />
          Clic derecho mantenido: atrae el cubo señalado.<br />
          Suelta el clic derecho para lanzarlo hacia donde miras.
        </p>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
